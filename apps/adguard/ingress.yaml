apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguard
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: adguard
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: adguard.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard
                port:
                  number: 80
