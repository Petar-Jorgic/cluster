apiVersion: apps/v1
kind: Deployment
metadata:
  name: arr-stack
  labels:
    app: arr-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: arr-stack
  template:
    metadata:
      labels:
        app: arr-stack
    spec:
      containers:
        # Gluetun VPN - all traffic goes through this
        - name: gluetun
          image: qmcgaw/gluetun:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          ports:
            - containerPort: 8080  # qbittorrent
            - containerPort: 9696  # prowlarr
            - containerPort: 8191  # flaresolverr
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: VPN_TYPE
              value: "wireguard"
            - name: VPN_ENDPOINT_IP
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn
                  key: VPN_ENDPOINT_IP
            - name: VPN_ENDPOINT_PORT
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn
                  key: VPN_ENDPOINT_PORT
            - name: WIREGUARD_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn
                  key: WIREGUARD_PUBLIC_KEY
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn
                  key: WIREGUARD_PRIVATE_KEY
            - name: WIREGUARD_PRESHARED_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn
                  key: WIREGUARD_PRESHARED_KEY
            - name: WIREGUARD_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn
                  key: WIREGUARD_ADDRESSES
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "192.168.0.0/16,172.16.0.0/12,10.0.0.0/8"
            - name: FIREWALL_VPN_INPUT_PORTS
              value: "65401"
            - name: TZ
              value: "Europe/Berlin"
            - name: BLOCK_MALICIOUS
              value: "off"
            - name: DOT
              value: "off"
            - name: DNS_ADDRESS
              value: "10.43.15.186"
            - name: HEALTH_ICMP_TARGET_IPS
              value: "9.9.9.9"
            - name: HEALTH_VPN_DURATION_INITIAL
              value: "30s"
            - name: WIREGUARD_MTU
              value: "1420"
            - name: WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL
              value: "25s"
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "ip6tables -F OUTPUT; ip6tables -A OUTPUT -o lo -j ACCEPT; ip6tables -A OUTPUT -j REJECT"
          volumeMounts:
            - name: gluetun-config
              mountPath: /gluetun
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

        # qBittorrent - Torrent client (needs VPN)
        - name: qbittorrent
          image: linuxserver/qbittorrent:latest
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: "Europe/Berlin"
            - name: WEBUI_PORT
              value: "8080"
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: qbittorrent
            - name: nas
              mountPath: /downloads
              subPath: arr-stack/downloads/torrents
            - name: nas
              mountPath: /mnt/media
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi

        # Prowlarr - Indexer manager (needs VPN for torrent indexers)
        - name: prowlarr
          image: linuxserver/prowlarr:latest
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: "Europe/Berlin"
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: prowlarr
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # FlareSolverr - Cloudflare bypass (needs VPN)
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi

      volumes:
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: gluetun-config
          emptyDir: {}
        - name: config
          persistentVolumeClaim:
            claimName: arr-config-pvc
        - name: nas
          persistentVolumeClaim:
            claimName: arr-nas-pvc
