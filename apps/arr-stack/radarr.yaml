apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  labels:
    app: radarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: linuxserver/radarr:latest
          # Unify storage on ONE mount (/data = whole NAS export) and expose the
          # legacy paths as symlinks into it, so existing DB paths resolve unchanged
          # AND downloads+library share a mount -> Radarr imports via hardlink (no copy).
          command: ["/bin/sh","-c","rm -rf /movies /downloads; ln -s /data/arr/Plex/film /movies; ln -s /data/arr-stack/downloads/torrents /downloads; exec /init"]
          ports:
            - containerPort: 7878
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: "Europe/Berlin"
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: radarr
            - name: nas
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: arr-config-pvc
        - name: nas
          persistentVolumeClaim:
            claimName: arr-nas-pvc
