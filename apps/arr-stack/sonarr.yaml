apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  labels:
    app: sonarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          image: linuxserver/sonarr:latest
          # Unify storage on ONE mount (/data = whole NAS export) and expose the
          # legacy paths as symlinks into it, so existing DB paths resolve unchanged
          # AND downloads+library share a mount -> Sonarr imports via hardlink (no copy).
          command: ["/bin/sh","-c","rm -rf /tv /anime /downloads; ln -s /data/arr/Plex/TV /tv; ln -s /data/arr/Plex/Anime/Series /anime; ln -s /data/arr-stack/downloads/torrents /downloads; exec /init"]
          ports:
            - containerPort: 8989
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: "Europe/Berlin"
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: sonarr
            - name: nas
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 4Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: arr-config-pvc
        - name: nas
          persistentVolumeClaim:
            claimName: arr-nas-pvc
