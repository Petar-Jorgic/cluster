apiVersion: v1
kind: PersistentVolume
metadata:
  name: audiobookshelf-nfs-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-audiobookshelf
  nfs:
    server: 192.168.1.162
    path: /volume1/docker/audiobookshelf
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-data
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-audiobookshelf
  resources:
    requests:
      storage: 100Gi
  volumeName: audiobookshelf-nfs-pv
