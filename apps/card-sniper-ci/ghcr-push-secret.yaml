# ghcr push credentials for the buildah step (PAT scope: write:packages).
# Pull side is a separate, read-only secret in the card-sniper namespace.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghcr-push-secret
  namespace: card-sniper-ci
spec:
  encryptedData:
    .dockerconfigjson: 
  template:
    metadata:
      name: ghcr-push-secret
      namespace: card-sniper-ci
    type: kubernetes.io/dockerconfigjson
