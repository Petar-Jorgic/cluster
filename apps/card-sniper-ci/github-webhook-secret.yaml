# HMAC shared secret for the GitHub push webhook — the EventListener's github
# interceptor rejects anything not signed with it.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: github-webhook-secret
  namespace: card-sniper-ci
spec:
  encryptedData:
    secretToken: 
  template:
    metadata:
      name: github-webhook-secret
      namespace: card-sniper-ci
