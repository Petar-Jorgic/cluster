apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No global `namespace:` here — every object carries its own, and the rollout
# Role/RoleBinding deliberately live in the *card-sniper* namespace. A global
# override would rewrite those too, and the build could not touch the app's pods.
resources:
  - rbac.yaml
  - pvc.yaml
  - github-webhook-secret.yaml
  - github-token-secret.yaml
  - ghcr-push-secret.yaml
  - task.yaml
  - triggers.yaml
  - ingress.yaml
