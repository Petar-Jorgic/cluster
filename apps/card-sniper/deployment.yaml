apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-sniper
  labels:
    app.kubernetes.io/name: card-sniper
    app.kubernetes.io/part-of: card-sniper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: card-sniper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: card-sniper
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/hostname: pj
      # Disaster recovery: if the PVC is ever empty (lost/replaced), restore the
      # DB from the Litestream backup before the app starts. No-op when the DB
      # already exists (verified: "database already exists, skipping", exit 0).
      initContainers:
        - name: litestream-restore
          image: litestream/litestream:0.5.12-scratch
          args: ["restore", "-if-db-not-exists", "-if-replica-exists", "-o", "/data/card-sniper.db", "/data/card-sniper.db"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          envFrom:
            - secretRef:
                name: card-sniper-litestream
          volumeMounts:
            - name: data
              mountPath: /data
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
      containers:
        - name: card-sniper
          # Built on-node with buildah and imported into k3s containerd by
          # ~/deploy-cardsniper.sh on pj — no registry pull. IfNotPresent uses the
          # locally-imported :latest; a deploy re-imports it and deletes the pod.
          image: localhost/card-sniper:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_PATH
              value: /data/card-sniper.db
            # 4 FlareSolverr+Tor pods, each on its own exit IP. Workers
            # round-robin across them so CF only sees ~1/4 of the request
            # rate per source IP.
            - name: FLARESOLVERR_URLS
              value: "http://flaresolverr-1.flaresolverr.svc:8191,http://flaresolverr-2.flaresolverr.svc:8191,http://flaresolverr-3.flaresolverr.svc:8191,http://flaresolverr-4.flaresolverr.svc:8191"
            - name: FLARESOLVERR_URL
              value: http://flaresolverr.flaresolverr.svc:8191
            # AUTO_REBUILD is OFF after the 2026-04-27 phase-7 report
            # (2064 OP cards, 100% with real CM URL). Leaving it on means
            # every pod restart enumerates + scrapes + cleans up — phase 6
            # would then delete OPTCG-resynced orphans on every cycle.
            # Manual rebuild trigger remains available via /admin/rebuild-onepiece/start.
            - name: CARD_SNIPER_AUTO_REBUILD
              value: "0"
            # SYNC_NOW one-shot completed 2026-04-27 (5663 OP cards in DB,
            # 3671 with card_color). Reverted to 0 so subsequent restarts
            # skip the catalog sync; the daily APScheduler job already
            # keeps the OPTCG catalog up-to-date.
            - name: CARD_SNIPER_SYNC_NOW
              value: "0"
            # 4 parallel FlareSolverr sessions sharing one VPS exit IP. Conservative
            # delays since all 4 workers come from the same IP — bumped from 0.5/1.5
            # to 1.5/3.0 to keep total req/min from VPS under CF's per-IP threshold.
            - name: REBUILD_CONCURRENCY
              value: "4"
            - name: REBUILD_MIN_DELAY
              value: "1.5"
            - name: REBUILD_MAX_DELAY
              value: "3.0"
            # Claude-Aufrufe ueber den selbstgehosteten Meridian-Proxy schicken
            # -> verbraucht das Max-Subscription-Quota statt API-Token-Billing.
            # Anthropic-Python-SDK respektiert ANTHROPIC_BASE_URL automatisch,
            # kein Code-Change in card-sniper noetig. Der API_KEY aus card-sniper-env
            # wird von Meridian ignoriert (nutzt unsere OAuth-Subscription).
            - name: ANTHROPIC_BASE_URL
              value: "http://meridian.meridian.svc.cluster.local:3456"
            # AI features (Max) run on the Gemini API (flash-lite: ~1s vision,
            # free tier for the beta phase). Ollama (Gemma) stays as fallback via
            # CARD_SNIPER_AI_PROVIDER=ollama; key in card-sniper-gemini secret.
            - name: CARD_SNIPER_AI_PROVIDER
              value: "gemini"
            - name: CARD_SNIPER_OLLAMA_URL
              value: "http://ollama.ollama.svc.cluster.local:11434"
            - name: CARD_SNIPER_AI_MODEL
              value: "gemini-flash-lite-latest"
          envFrom:
            - secretRef:
                name: card-sniper-env
            - secretRef:
                name: card-sniper-s3      # S3_ENDPOINT/REGION/BUCKET/ACCESS_KEY/SECRET_KEY — image bucket
            - secretRef:
                name: card-sniper-iap     # REVENUECAT_WEBHOOK_TOKEN — IAP webhook auth
            - secretRef:
                name: card-sniper-rapidapi  # RAPIDAPI_KEY + RESELLER_DELAY_MS — reseller price API
                optional: true
            - secretRef:
                name: card-sniper-gemini    # GEMINI_API_KEY — scanner vision + deck/market AI
                optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            # Thumbnail decoding (image crate, spawn_blocking) is CPU-hungry;
            # 500m starved the async runtime for minutes under image bursts
            # (API requests visibly hung). The node has 16 cores.
            limits:
              cpu: "3"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: card-sniper-data
        - name: litestream-config
          configMap:
            name: litestream-config
