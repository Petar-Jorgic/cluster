apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-sniper
  labels:
    app.kubernetes.io/name: card-sniper
    app.kubernetes.io/part-of: card-sniper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: card-sniper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: card-sniper
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/hostname: pj
      containers:
        - name: card-sniper
          image: ghcr.io/petar-jorgic/card-sniper:15ff36a13ee2f0bf86641a5217a43ca98f24431d
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_PATH
              value: /data/card-sniper.db
            # 4 FlareSolverr+Tor pods, each on its own exit IP. Workers
            # round-robin across them so CF only sees ~1/4 of the request
            # rate per source IP.
            - name: FLARESOLVERR_URLS
              value: "http://flaresolverr-1.flaresolverr.svc:8191,http://flaresolverr-2.flaresolverr.svc:8191,http://flaresolverr-3.flaresolverr.svc:8191,http://flaresolverr-4.flaresolverr.svc:8191"
            - name: FLARESOLVERR_URL
              value: http://flaresolverr.flaresolverr.svc:8191
            # AUTO_REBUILD is OFF after the 2026-04-27 phase-7 report
            # (2064 OP cards, 100% with real CM URL). Leaving it on means
            # every pod restart enumerates + scrapes + cleans up — phase 6
            # would then delete OPTCG-resynced orphans on every cycle.
            # Manual rebuild trigger remains available via /admin/rebuild-onepiece/start.
            - name: CARD_SNIPER_AUTO_REBUILD
              value: "0"
            # SYNC_NOW one-shot completed 2026-04-27 (5663 OP cards in DB,
            # 3671 with card_color). Reverted to 0 so subsequent restarts
            # skip the catalog sync; the daily APScheduler job already
            # keeps the OPTCG catalog up-to-date.
            - name: CARD_SNIPER_SYNC_NOW
              value: "0"
            # 4 parallel FlareSolverr sessions sharing one VPS exit IP. Conservative
            # delays since all 4 workers come from the same IP — bumped from 0.5/1.5
            # to 1.5/3.0 to keep total req/min from VPS under CF's per-IP threshold.
            - name: REBUILD_CONCURRENCY
              value: "4"
            - name: REBUILD_MIN_DELAY
              value: "1.5"
            - name: REBUILD_MAX_DELAY
              value: "3.0"
          envFrom:
            - secretRef:
                name: card-sniper-env
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: card-sniper-data
