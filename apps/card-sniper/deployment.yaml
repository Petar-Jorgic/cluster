apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-sniper
  labels:
    app.kubernetes.io/name: card-sniper
    app.kubernetes.io/part-of: card-sniper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: card-sniper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: card-sniper
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/hostname: pj
      containers:
        - name: card-sniper
          image: ghcr.io/petar-jorgic/card-sniper:3a438bab375122bc162d2853f30b1bdb00c94a90
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_PATH
              value: /data/card-sniper.db
            # 4 FlareSolverr+Tor pods, each on its own exit IP. Workers
            # round-robin across them so CF only sees ~1/4 of the request
            # rate per source IP.
            - name: FLARESOLVERR_URLS
              value: "http://flaresolverr-1.flaresolverr.svc:8191,http://flaresolverr-2.flaresolverr.svc:8191,http://flaresolverr-3.flaresolverr.svc:8191,http://flaresolverr-4.flaresolverr.svc:8191"
            - name: FLARESOLVERR_URL
              value: http://flaresolverr.flaresolverr.svc:8191
            # AUTO_REBUILD off until we have a CF-clean egress (planned: VPS
            # SOCKS5 proxy). Tor exits are categorically blocked by Cardmarket's
            # Cloudflare so a rebuild via Tor can't complete; setting this to 1
            # without a clean egress just burns retries until URLs hit 'dead'.
            - name: CARD_SNIPER_AUTO_REBUILD
              value: "0"
            - name: REBUILD_CONCURRENCY
              value: "1"
          envFrom:
            - secretRef:
                name: card-sniper-env
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: card-sniper-data
