apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-sniper
  labels:
    app.kubernetes.io/name: card-sniper
    app.kubernetes.io/part-of: card-sniper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: card-sniper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: card-sniper
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/hostname: pj
      containers:
        - name: card-sniper
          image: ghcr.io/petar-jorgic/card-sniper:2057d1ee5c7b7b169f212cf7b76b28f72ed3a119
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_PATH
              value: /data/card-sniper.db
            - name: FLARESOLVERR_URL
              value: http://flaresolverr.flaresolverr.svc:8191
          envFrom:
            - secretRef:
                name: card-sniper-env
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: card-sniper-data
