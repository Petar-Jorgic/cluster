apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-sniper
  labels:
    app.kubernetes.io/name: card-sniper
    app.kubernetes.io/part-of: card-sniper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: card-sniper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: card-sniper
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/hostname: pj
      containers:
        - name: card-sniper
          image: ghcr.io/petar-jorgic/card-sniper:d593a09fdc1bbf1203da14576c7a91e87de54a0c
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_PATH
              value: /data/card-sniper.db
            - name: FLARESOLVERR_URL
              value: http://flaresolverr.flaresolverr.svc:8191
            # One-shot full Cardmarket rebuild: wipe cm_scrape_queue then bounce
            # the pod. After the rebuild finishes, queue stays full of 'done'
            # rows and subsequent restarts are no-ops. Remove this env once the
            # final report shows real_cm/priced/imaged ≥ 90% of total.
            - name: CARD_SNIPER_AUTO_REBUILD
              value: "1"
            - name: REBUILD_CONCURRENCY
              value: "3"
          envFrom:
            - secretRef:
                name: card-sniper-env
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: card-sniper-data
