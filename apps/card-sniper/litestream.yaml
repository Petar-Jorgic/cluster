apiVersion: v1
kind: ConfigMap
metadata:
  name: litestream-config
data:
  litestream.yml: |
    dbs:
      - path: /data/card-sniper.db
        replica:
          type: s3
          bucket: card-sniper-db-backup
          path: card-sniper.db
          endpoint: http://minio.minio.svc:9000
          region: us-east-1
          access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
          secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
          force-path-style: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-sniper-litestream
  labels:
    app.kubernetes.io/name: card-sniper-litestream
    app.kubernetes.io/part-of: card-sniper
spec:
  replicas: 1
  # Separate from the app pod on purpose: a litestream crash must not flip the
  # app pod to NotReady. Recreate so only one process ever writes the shadow WAL.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: card-sniper-litestream
  template:
    metadata:
      labels:
        app.kubernetes.io/name: card-sniper-litestream
    spec:
      # Must co-locate with the card-sniper pod — same local-path PVC lives on pj.
      nodeSelector:
        kubernetes.io/hostname: pj
      containers:
        - name: litestream
          image: litestream/litestream:0.5.12-scratch
          args: ["replicate"]
          envFrom:
            - secretRef:
                name: card-sniper-litestream   # LITESTREAM_ACCESS_KEY_ID / _SECRET_ACCESS_KEY
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: card-sniper-data
        - name: config
          configMap:
            name: litestream-config
