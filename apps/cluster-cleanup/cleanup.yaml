apiVersion: v1
kind: ServiceAccount
metadata:
  name: cleanup
  namespace: cluster-cleanup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-cleanup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-cleanup
subjects:
  - kind: ServiceAccount
    name: cleanup
    namespace: cluster-cleanup
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup
  namespace: cluster-cleanup
spec:
  schedule: "0 4 * * *"
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: cleanup
          containers:
            - name: cleanup
              image: alpine/k8s:1.34.1
              env:
                - name: GOTIFY_URL
                  value: "http://gotify.gotify.svc:80"
                - name: GOTIFY_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cluster-cleanup-gotify
                      key: GOTIFY_TOKEN
              command:
                - /bin/sh
                - -c
                - |
                  set -u
                  command -v curl >/dev/null 2>&1 || apk add --no-cache curl >/dev/null 2>&1 || true

                  # --- Completed (Succeeded) + Failed pods ---
                  PP=$(kubectl get pods -A --field-selector=status.phase==Succeeded --no-headers 2>/dev/null | wc -l)
                  PF=$(kubectl get pods -A --field-selector=status.phase==Failed --no-headers 2>/dev/null | wc -l)
                  kubectl delete pods -A --field-selector=status.phase==Succeeded --ignore-not-found >/dev/null 2>&1 || true
                  kubectl delete pods -A --field-selector=status.phase==Failed --ignore-not-found >/dev/null 2>&1 || true
                  PODS=$((PP + PF))

                  # --- empty ReplicaSets, skip the current RS of deployments scaled to 0 ---
                  ZERO=$(kubectl get deploy -A -o jsonpath='{range .items[?(@.spec.replicas==0)]}{.metadata.namespace}/{.metadata.name},{end}' 2>/dev/null)
                  RSLIST=$(kubectl get rs -A -o jsonpath='{range .items[?(@.spec.replicas==0)]}{.metadata.namespace}|{.metadata.ownerReferences[0].name}|{.metadata.name}{"\n"}{end}' 2>/dev/null \
                    | while IFS='|' read -r ns own name; do
                        [ -z "$name" ] && continue
                        case "$ZERO" in *"$ns/$own,"*) continue ;; esac
                        echo "$ns $name"
                      done)
                  RS=$(printf '%s\n' "$RSLIST" | grep -c .)
                  printf '%s\n' "$RSLIST" | while read -r ns name; do
                    [ -n "$ns" ] && kubectl delete rs -n "$ns" "$name" --ignore-not-found >/dev/null 2>&1
                  done

                  echo "cleanup: pods=$PODS rs=$RS"

                  # --- Gotify notify only if something was actually removed ---
                  if [ "$((PODS + RS))" -gt 0 ]; then
                    MSG="Aufgeraeumt: ${PODS} Pods (Completed/Failed), ${RS} leere ReplicaSets."
                    curl -fsS -X POST "${GOTIFY_URL}/message?token=${GOTIFY_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "{\"title\":\"Cluster Cleanup\",\"message\":\"${MSG}\",\"priority\":3}" >/dev/null 2>&1 \
                      && echo "gotify: sent" || echo "gotify: failed"
                  else
                    echo "nothing deleted, no notification"
                  fi
              resources:
                requests:
                  cpu: 20m
                  memory: 48Mi
                limits:
                  cpu: 300m
                  memory: 192Mi
