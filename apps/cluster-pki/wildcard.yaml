# Zertifikat fuer alle .lan-Hosts.
#
# Kein Wildcard: *.lan waere nur eine Ebene unter einer TLD, das lehnen
# Browser und curl grundsaetzlich ab. Die Namen muessen einzeln stehen.
#
# Neuen .lan-Host angelegt? Hier eintragen, sonst gibt es dafuer eine
# Zertifikatswarnung. Liste erzeugen mit:
#   kubectl get ingress -A -o jsonpath=... | grep "\.lan$" | sort -u
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-lan
  namespace: kube-system
spec:
  secretName: wildcard-lan-tls
  duration: 2160h    # 90 Tage
  renewBefore: 720h  # 30 Tage vorher erneuern
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  commonName: home-lab.lan
  dnsNames:
    - adguard.lan
    - aniworld.lan
    - argocd.lan
    - audiobooks.lan
    - bazarr.lan
    - bindery.lan
    - card-sniper.lan
    - cardsniper-preview.lan
    - changes.lan
    - claude.lan
    - dasharr.lan
    - element.lan
    - gotify.lan
    - grafana.lan
    - headlamp.lan
    - homarr.lan
    - immich.lan
    - jellyfin.lan
    - jellyseerr.lan
    - matrix.lan
    - miniflux.lan
    - minio.lan
    - obsidian.lan
    - omni.lan
    - prowlarr.lan
    - qbittorrent.lan
    - radarr.lan
    - readarr.lan
    - s3.lan
    - semaphore.lan
    - sonarr.lan
    - speedtest.lan
    - suggestarr.lan
    - trailarr.lan
    - trillium.lan
    - uptime.lan
    - vikunja.lan
  issuerRef:
    name: lan-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# Traefik liefert dieses Zertifikat als Standard aus, damit keiner der
# bestehenden Ingresses angefasst werden muss.
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: kube-system
spec:
  defaultCertificate:
    secretName: wildcard-lan-tls
