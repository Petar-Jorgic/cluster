apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec-bouncer
  namespace: crowdsec
  labels:
    app.kubernetes.io/name: crowdsec-bouncer
    app.kubernetes.io/part-of: crowdsec
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crowdsec-bouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crowdsec-bouncer
    spec:
      containers:
        - name: bouncer
          image: fbonalair/traefik-crowdsec-bouncer:latest
          env:
            - name: CROWDSEC_BOUNCER_API_KEY
              value: "changeme"
            - name: CROWDSEC_AGENT_HOST
              value: "crowdsec-service.crowdsec.svc.cluster.local:8080"
            - name: GIN_MODE
              value: "release"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: crowdsec-bouncer
  namespace: crowdsec
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: crowdsec-bouncer
  ports:
    - port: 8080
      targetPort: 8080
