apiVersion: apps/v1
kind: Deployment
metadata:
  name: dasharr
  labels:
    app.kubernetes.io/name: dasharr
    app.kubernetes.io/part-of: dasharr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dasharr
      app.kubernetes.io/part-of: dasharr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dasharr
        app.kubernetes.io/part-of: dasharr
    spec:
      # local-path config PVC -> pin to control plane.
      nodeSelector:
        kubernetes.io/hostname: pj
      containers:
        - name: dasharr
          # Unified media/network dashboard (Plex/Sonarr/Radarr/qBittorrent/...).
          # NOTE: name collides with ghcr.io/arcadia-solutions/dasharr (a private
          # tracker ratio tool) — this is the dasharr.io one, the one we want.
          image: schenanigans/dasharr:latest
          env:
            - name: TZ
              value: Europe/Berlin
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: dasharr-config
