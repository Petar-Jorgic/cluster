apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dasharr-postgres-data
  labels:
    app.kubernetes.io/name: dasharr-postgres
    app.kubernetes.io/part-of: dasharr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dasharr-postgres
  labels:
    app.kubernetes.io/name: dasharr-postgres
    app.kubernetes.io/part-of: dasharr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dasharr-postgres
      app.kubernetes.io/part-of: dasharr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dasharr-postgres
        app.kubernetes.io/part-of: dasharr
    spec:
      nodeSelector:
        kubernetes.io/hostname: pj
      containers:
        - name: postgres
          # Pinned to match upstream compose (Arcadia-Solutions/Dasharr).
          image: postgres:18.0
          env:
            - name: POSTGRES_DB
              value: dasharr
            - name: POSTGRES_USER
              value: dasharr
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dasharr-secrets
                  key: POSTGRES_PASSWORD
            - name: TZ
              value: Europe/Berlin
          ports:
            - name: postgres
              containerPort: 5432
          # PG18 image keeps PGDATA under /var/lib/postgresql/<ver>/docker, so the
          # whole /var/lib/postgresql dir is the persistence point (per upstream compose).
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dasharr-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: dasharr-db
  labels:
    app.kubernetes.io/name: dasharr-postgres
    app.kubernetes.io/part-of: dasharr
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: dasharr-postgres
    app.kubernetes.io/part-of: dasharr
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
