# 4 independent FlareSolverr pods. Each has a Tor sidecar at localhost:9050
# (its own torrc-N ConfigMap). PROXY_URL routes Chromium through Tor, since
# the previous VPS-residential proxy (sealed in proxy-secret.yaml, kept for
# reference) is CF-banned for /Products/Singles/<product> URLs and CF rate-
# limits it on /Search after ~150 requests. Tor circuits churn through fresh
# exit IPs which CF accepts per-circuit, and FlareSolverr sessions can stay
# persistent because every request resolves through the same per-pod Tor
# socket. The 4 pods give 4 parallel Chrome sessions, each holding its own
# cf_clearance cookie tied to whatever Tor exit it ended up on.
# Workers in card-sniper round-robin session_ids across the 4 services so
# each session sticks to one FlareSolverr instance (sessions are per-instance).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr-1
  labels:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/instance: flaresolverr-1
    app.kubernetes.io/part-of: flaresolverr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
      app.kubernetes.io/instance: flaresolverr-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flaresolverr
        app.kubernetes.io/instance: flaresolverr-1
        app.kubernetes.io/part-of: flaresolverr
    spec:
      nodeSelector:
        kubernetes.io/hostname: pj
      volumes:
        - name: torrc
          configMap:
            name: torrc-1
      containers:
        - name: tor
          image: osminogin/tor-simple:latest
          ports:
            - name: socks
              containerPort: 9050
          volumeMounts:
            - name: torrc
              mountPath: /etc/tor/torrc
              subPath: torrc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          ports:
            - name: http
              containerPort: 8191
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: LOG_LEVEL
              value: "info"
            # PROXY_URL points at the per-pod Tor sidecar (localhost:9050).
            # The earlier VPS proxy (Swiss residential IP) is CF-banned for
            # /Products/Singles/<product> URLs and was rate-limiting at ~150
            # requests on /Search. Tor exits churn through fresh IPs which
            # CF accepts on a per-circuit basis. Sessions can stay persistent
            # because every request uses the same Tor sidecar; chromium memory
            # is reclaimed cleanly between session-bound requests.
            - name: PROXY_URL
              value: "socks5://localhost:9050"
          resources:
            requests:
              cpu: 100m
              # 1.5Gi limit — fresh-browser-per-request via Tor briefly
              # holds ~600MB while the previous browser is still releasing.
              # 768Mi was OOMKilling on every other request, causing >50%
              # ConnectError failure rate.
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1.5Gi
---
