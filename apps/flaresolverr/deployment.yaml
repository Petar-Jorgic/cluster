# 4 independent FlareSolverr pods. PROXY_URL points at the VPS SOCKS5 proxy
# (sealed in proxy-secret.yaml) — using Cardmarket-clean residential-grade
# Swiss VPS IP instead of Tor exits, since CF blocks all known Tor exits
# categorically when scraping CM. The Tor sidecar containers are kept as a
# fallback (FlareSolverr can swap PROXY_URL via env override) but normally
# unused. The 4 pods give 4 parallel FlareSolverr Chrome sessions, each
# holding its own cf_clearance cookie, sharing one outbound IP.
# Workers in card-sniper round-robin session_ids across the 4 services so
# each session sticks to one FlareSolverr instance (sessions are per-instance).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr-1
  labels:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/instance: flaresolverr-1
    app.kubernetes.io/part-of: flaresolverr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
      app.kubernetes.io/instance: flaresolverr-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flaresolverr
        app.kubernetes.io/instance: flaresolverr-1
        app.kubernetes.io/part-of: flaresolverr
    spec:
      nodeSelector:
        kubernetes.io/hostname: pj
      volumes:
        - name: torrc
          configMap:
            name: torrc-1
      containers:
        - name: tor
          image: osminogin/tor-simple:latest
          ports:
            - name: socks
              containerPort: 9050
          volumeMounts:
            - name: torrc
              mountPath: /etc/tor/torrc
              subPath: torrc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          ports:
            - name: http
              containerPort: 8191
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: LOG_LEVEL
              value: "info"
            - name: PROXY_URL
              valueFrom:
                secretKeyRef:
                  name: socks5-proxy
                  key: PROXY_URL
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
