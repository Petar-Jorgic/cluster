# 4 independent FlareSolverr+Tor pods so card-sniper rebuild workers can hit
# Cardmarket from 4 different Tor exit IPs in parallel without triggering
# CF rate-limit. Each pod has its own ephemeral Tor data dir AND a per-pod
# torrc (mounted from a ConfigMap) that pins ExitNodes to a different country
# pool — without the country pin Tor's high-bandwidth-preference makes 2-3
# pods share the same exit IP. Workers in card-sniper round-robin between the
# 4 services and stick a session_id to a single FlareSolverr instance.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr-1
  labels:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/instance: flaresolverr-1
    app.kubernetes.io/part-of: flaresolverr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
      app.kubernetes.io/instance: flaresolverr-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flaresolverr
        app.kubernetes.io/instance: flaresolverr-1
        app.kubernetes.io/part-of: flaresolverr
    spec:
      nodeSelector:
        kubernetes.io/hostname: pj
      volumes:
        - name: torrc
          configMap:
            name: torrc-1
      containers:
        - name: tor
          image: osminogin/tor-simple:latest
          ports:
            - name: socks
              containerPort: 9050
          volumeMounts:
            - name: torrc
              mountPath: /etc/tor/torrc
              subPath: torrc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          ports:
            - name: http
              containerPort: 8191
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: LOG_LEVEL
              value: "info"
            - name: PROXY_URL
              value: "socks5://localhost:9050"
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
