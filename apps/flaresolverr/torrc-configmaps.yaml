# Per-pod torrc — restricts each Tor instance to a different country pool so
# the 4 FlareSolverr pods get exit IPs from different ranges. Without this,
# Tor's high-bandwidth-preference makes 2-3 pods share the same exit node.
# Countries chosen for: high exit-relay count, low CF-flag rate, EU/EFTA only
# (Cardmarket de-prioritizes US/Asia exits regardless).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: torrc-1
  labels:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/instance: flaresolverr-1
data:
  torrc: |
    SocksPort 0.0.0.0:9050
    DataDirectory /var/lib/tor
    Log notice file /var/log/tor/notices.log
    ExitNodes {de}
    StrictNodes 1
    NewCircuitPeriod 600
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: torrc-2
  labels:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/instance: flaresolverr-2
data:
