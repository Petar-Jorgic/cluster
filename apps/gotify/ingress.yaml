apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gotify
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: gotify
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: gotify.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gotify
                port:
                  number: 80
    - host: gotify.pj-home-lab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gotify
                port:
                  number: 80
