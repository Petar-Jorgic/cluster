apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: homarr
    app.kubernetes.io/part-of: homarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: homarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homarr
    spec:
      nodeSelector:
        kubernetes.io/hostname: pj
      containers:
        - name: homarr
          image: ghcr.io/homarr-labs/homarr:latest
          ports:
            - containerPort: 3000
          env:
            - name: TZ
              value: Europe/Berlin
            - name: SECRET_ENCRYPTION_KEY
              value: d045943d82c3d999daabb71167665c7960d2ccab787d9091ca80020b5e49c024
          volumeMounts:
            - name: data
              mountPath: /appdata
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: homarr-data
