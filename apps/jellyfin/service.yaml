apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: jellyfin
spec:
  type: ClusterIP
  clusterIP: 10.43.210.235
  # No selector on purpose: Jellyfin now runs on the NAS (192.168.1.162:8096).
  # The manual Endpoints below make Traefik (and apps) reach the NAS instead of a k3s pod.
  ports:
    - name: http
      port: 8096
      targetPort: 8096
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jellyfin
  labels:
    app.kubernetes.io/part-of: jellyfin
subsets:
  - addresses:
      - ip: 192.168.1.162
    ports:
      - name: http
        port: 8096
        protocol: TCP
