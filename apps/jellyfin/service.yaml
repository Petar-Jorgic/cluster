apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: jellyfin
spec:
  type: ClusterIP
  # No selector: Jellyfin runs on the NAS. The EndpointSlice below points there.
  ports:
    - name: http
      port: 8096
      targetPort: 8096
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: jellyfin-nas
  labels:
    kubernetes.io/service-name: jellyfin
    app.kubernetes.io/part-of: jellyfin
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.1.162
    conditions:
      ready: true
ports:
  - name: http
    port: 8096
    protocol: TCP
