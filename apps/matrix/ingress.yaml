apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synapse
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: matrix
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: matrix.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: synapse
                port:
                  number: 8008
    - host: matrix.pj-home-lab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: synapse
                port:
                  number: 8008
---
apiVersion: networking.k8s.io/v1
