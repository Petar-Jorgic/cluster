apiVersion: apps/v1
kind: Deployment
metadata:
  name: mautrix-whatsapp
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: mautrix-whatsapp
    app.kubernetes.io/part-of: matrix
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mautrix-whatsapp
      app.kubernetes.io/part-of: matrix
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: mautrix-whatsapp
        app.kubernetes.io/part-of: matrix
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: mautrix-whatsapp
          image: dock.mau.dev/mautrix/whatsapp:latest
          command: ["/usr/bin/mautrix-whatsapp", "-c", "/config/config.yaml", "-n"]
          workingDir: /data
          env:
            - name: TZ
              value: Europe/Berlin
          ports:
            - name: appservice
              containerPort: 29318
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          secret:
            secretName: mautrix-whatsapp-secrets
        - name: data
          emptyDir: {}
      nodeSelector:
        kubernetes.io/hostname: pj
---
apiVersion: v1
kind: Service
metadata:
  name: mautrix-whatsapp
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: mautrix-whatsapp
    app.kubernetes.io/part-of: matrix
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mautrix-whatsapp
    app.kubernetes.io/part-of: matrix
  ports:
    - name: appservice
      port: 29318
      targetPort: 29318
      protocol: TCP
