apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synapse-data
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: synapse
    app.kubernetes.io/part-of: matrix
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: synapse
    app.kubernetes.io/part-of: matrix
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: synapse
      app.kubernetes.io/part-of: matrix
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: synapse
        app.kubernetes.io/part-of: matrix
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: synapse
          image: matrixdotorg/synapse:latest
          command: ["python", "-m", "synapse.app.homeserver"]
          args: ["--config-path", "/etc/synapse/homeserver.yaml"]
          env:
            - name: TZ
              value: Europe/Berlin
          ports:
            - name: http
              containerPort: 8008
          readinessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/synapse
              readOnly: true
            - name: appservice
              mountPath: /etc/synapse-appservice
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: synapse-data
        - name: config
          secret:
            secretName: synapse-secrets
        - name: appservice
          secret:
            secretName: mautrix-whatsapp-secrets
            items:
              - key: registration.yaml
                path: registration.yaml
      nodeSelector:
        kubernetes.io/hostname: pj
---
apiVersion: v1
kind: Service
metadata:
  name: synapse
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: synapse
    app.kubernetes.io/part-of: matrix
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: synapse
    app.kubernetes.io/part-of: matrix
  ports:
    - name: http
      port: 8008
      targetPort: 8008
      protocol: TCP
