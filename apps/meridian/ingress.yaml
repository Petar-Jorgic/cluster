apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meridian
  labels:
    app: meridian
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: claude.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meridian
                port:
                  number: 3456
