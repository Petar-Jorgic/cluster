apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflux
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/part-of: miniflux
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: miniflux
      app.kubernetes.io/part-of: miniflux
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: miniflux
        app.kubernetes.io/part-of: miniflux
    spec:
      containers:
        - name: miniflux
          image: miniflux/miniflux:latest
          env:
            - name: DATABASE_URL
              value: "postgres://miniflux:58f31d3d5ebc4e337f484213633e1153@miniflux-postgres:5432/miniflux?sslmode=disable"
            - name: RUN_MIGRATIONS
              value: "1"
            - name: CREATE_ADMIN
              value: "1"
            - name: ADMIN_USERNAME
              value: admin
            - name: ADMIN_PASSWORD
              value: admin123456
            - name: TZ
              value: Europe/Berlin
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      nodeSelector:
        kubernetes.io/hostname: pj
