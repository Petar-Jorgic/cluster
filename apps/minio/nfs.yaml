apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-nfs-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-minio
  nfs:
    server: 192.168.1.162
    path: /volume1/docker/minio
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-minio
  resources:
    requests:
      storage: 100Gi
  volumeName: minio-nfs-pv
