apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-custom
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kiosk-home.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "stat",
          "title": "",
          "gridPos": {"h": 2, "w": 24, "x": 0, "y": 0},
          "options": {"textMode": "name", "colorMode": "none", "graphMode": "none", "justifyMode": "center"},
          "fieldConfig": {"defaults": {"mappings": [], "thresholds": {"mode": "absolute", "steps": []}, "displayName": "HOMELAB CLUSTER"}, "overrides": []},
          "targets": [{"expr": "1", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]
        },
        {
          "type": "gauge",
          "title": "CPU",
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 2},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "mappings": [], "thresholds": {"mode": "percentage", "steps": [{"color": "#73BF69", "value": null}, {"color": "#FF9830", "value": 60}, {"color": "#F2495C", "value": 85}]}, "unit": "percentunit", "min": 0, "max": 1}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true},
          "targets": [{"expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]
        },
        {
          "type": "gauge",
          "title": "Memory",
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 2},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "mappings": [], "thresholds": {"mode": "percentage", "steps": [{"color": "#73BF69", "value": null}, {"color": "#FF9830", "value": 60}, {"color": "#F2495C", "value": 85}]}, "unit": "percentunit", "min": 0, "max": 1}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true},
          "targets": [{"expr": "1 - (sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]
        },
        {
          "type": "gauge",
          "title": "Disk",
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 2},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "mappings": [], "thresholds": {"mode": "percentage", "steps": [{"color": "#73BF69", "value": null}, {"color": "#FF9830", "value": 70}, {"color": "#F2495C", "value": 90}]}, "unit": "percentunit", "min": 0, "max": 1}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true},
          "targets": [{"expr": "1 - (node_filesystem_avail_bytes{mountpoint=\"/\",instance=~\".*:9100\"} / node_filesystem_size_bytes{mountpoint=\"/\",instance=~\".*:9100\"})", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]
        },
        {
          "type": "stat",
          "title": "Uptime",
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 2},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "#73BF69", "value": null}]}, "unit": "dtdurations"}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "none", "justifyMode": "center", "textMode": "auto"},
          "targets": [{"expr": "max(time() - node_boot_time_seconds)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]
        },
        {
          "type": "stat",
          "title": "Nodes",
          "gridPos": {"h": 3, "w": 4, "x": 0, "y": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "#73BF69", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "none", "justifyMode": "center", "textMode": "auto"},
          "targets": [{"expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]
        },
        {
          "type": "stat",
          "title": "Pods",
          "gridPos": {"h": 3, "w": 4, "x": 4, "y": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
