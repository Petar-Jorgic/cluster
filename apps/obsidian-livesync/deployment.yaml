apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchdb
  namespace: obsidian-livesync
  labels:
    app: couchdb
spec:
  replicas: 1
  strategy:
    type: Recreate   # single instance on shared NFS — never run two at once
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
    spec:
      nodeSelector:
        kubernetes.io/hostname: pj   # NFS client only on control-plane node (matches minio)
      securityContext:
        runAsUser: 5984     # run as couchdb; entrypoint then skips the root chown that
        runAsGroup: 5984    # fails on the read-only configmap subPath (set -e -> silent exit)
        fsGroup: 5984
      containers:
        - name: couchdb
          image: couchdb:3.4.2
          ports:
            - name: http
              containerPort: 5984
          envFrom:
            - secretRef:
                name: couchdb-admin
          volumeMounts:
            - name: data
              mountPath: /opt/couchdb/data
            - name: config
              mountPath: /opt/couchdb/etc/local.d/local.ini
              subPath: local.ini
          readinessProbe:
            httpGet:
              path: /_up
              port: 5984
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_up
              port: 5984
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: couchdb-data
        - name: config
          configMap:
            name: couchdb-config
