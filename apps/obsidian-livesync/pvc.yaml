apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: couchdb-data
spec:
  accessModes:
    - ReadWriteOnce
  # local-path (node-local SSD on pj). NFS was tried first but CouchDB needs
  # POSIX file locking/semantics NFS doesn't provide -> "No DB shards could be
  # opened" / eacces. Data durability is covered because every Obsidian device
  # holds a full replica of this sync hub.
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
