apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: recyclarr
    app.kubernetes.io/part-of: recyclarr
data:
  recyclarr.yml: |
    sonarr:
      sonarr-main:
        base_url: http://sonarr.arr-stack.svc.cluster.local:8989
        api_key: !env_var SONARR_API_KEY

        include:
          - template: sonarr-quality-definition-series
          - template: sonarr-v4-custom-formats-web-1080p

        quality_profiles:
          - name: HD-1080p
            upgrade:
              allowed: true
              until_quality: Bluray-1080p
              until_score: 10000
            min_format_score: 0
            quality_sort: top
            qualities:
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p

    radarr:
      radarr-main:
        base_url: http://radarr.arr-stack.svc.cluster.local:7878
        api_key: !env_var RADARR_API_KEY

        include:
          - template: radarr-quality-definition-movie
          - template: radarr-custom-formats-hd-bluray-web

        quality_profiles:
          - name: HD-1080p
            upgrade:
              allowed: true
              until_quality: Bluray-1080p
              until_score: 10000
            min_format_score: 0
            quality_sort: top
            qualities:
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
