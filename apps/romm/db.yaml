apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-db-data
  namespace: romm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: romm-db
  labels:
    app.kubernetes.io/name: romm-db
    app.kubernetes.io/part-of: romm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: romm-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: romm-db
    spec:
      nodeSelector:
        kubernetes.io/hostname: pj
      containers:
        - name: mariadb
          image: mariadb:11
          env:
            - name: MARIADB_DATABASE
              value: romm
            - name: MARIADB_USER
              value: romm-user
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: MARIADB_PASSWORD
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: MARIADB_ROOT_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: romm-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: romm-db
spec:
  selector:
    app.kubernetes.io/name: romm-db
  ports:
    - port: 3306
      targetPort: 3306
