apiVersion: v1
kind: PersistentVolume
metadata:
  name: trillium-nas-pv
  labels:
    app.kubernetes.io/part-of: trillium
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-trillium
  nfs:
    server: 192.168.1.162
    path: /volume1/docker/trillium
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trillium-data
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: trillium
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-trillium
  resources:
    requests:
      storage: 10Gi
  volumeName: trillium-nas-pv
