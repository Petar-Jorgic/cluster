apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: woodpecker
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: ghcr.io/woodpecker-ci/helm
      chart: woodpecker
      targetRevision: "3.5.1"
      helm:
        valueFiles:
          - $values/apps/woodpecker/values.yaml
    - repoURL: https://github.com/Petar-Jorgic/cluster.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: woodpecker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
